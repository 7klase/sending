<!DOCTYPE html>
<html>

<head>
    <title>Sending</title>
    <meta charset="UTF-8">
</head>

<style>
    body {
        font-family: Helvetica;
        height: 100vh;
        margin: 0px;
        background: linear-gradient(120deg, gray, rgb(53, 48, 48));
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .chat-box {
        background: linear-gradient(50deg, #808080, rgb(88, 81, 81));
        height: 75%;
        width: 50%;
        border-radius: 20px;
        border: 3px solid #3b3737;
        display: flex;
        flex-direction: column;
    }
    .header {
        display: flex;
        align-items: center;
        gap: 2%;
        padding: 2%;
    }
    .divider {
        background-color: #3b3737;
        width: 100%;
        height: 1.5%;
    }
    .inpt {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid black;
        border-radius: 20px;
        outline: none;
        box-shadow: none;
        color: rgb(0, 0, 0);
        height: 70%;
        width: 80%;
        font-size: 2vw;
        margin: auto 0 2% 5%;
    }
    .msg {
        width: 80%;
        height: 100%;
        border-radius: 20px;
        font-size: 1.5vw;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        padding-left: 4%;
    }
    .msgsent {
        display: flex;
        align-items: center;
        height: 20%;
        gap: 2%;
        padding: 2%;
        width: 80%;
        border-radius: 20px;
        margin-left: 4%;
        background-color: rgba(31, 65, 255, 0.5);
    }
    .messages {
        height: 60%;
        display: flex;
        flex-direction: column-reverse;
        gap: 10px;
        overflow-y: auto;
        padding: 10px;
        scroll-behavior: smooth;
    }
    @keyframes pushIn {
        from {
            transform: translateY(40px) scale(0.98);
            opacity: 0;
        }
        to {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
    }
    .msgsent {
        animation: pushIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .messages::-webkit-scrollbar {
        width: 8px;
    }

    .messages::-webkit-scrollbar-track {
        background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
    }
    .inputandsend {
        display: flex;
        align-items: center;
        padding: 2%;
        height: 15%;
    }
    .btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid black;
        border-radius: 20px;
        outline: none;
        box-shadow: none;
        color: rgb(0, 0, 0);
        height: 70%;
        width: 20%;
        font-size: 2vw;
        margin: auto 0 2% 1%;
    }
    .inpt:hover {
        background: rgba(255, 255, 255, 0.15);
    }
    .btn:hover {
        background: rgba(255, 255, 255, 0.1);
    }
</style>

    <body>
        <div class="chat-box">
            <div class="header">
                <img src="7klase.png" style="width: 6.5%; border-radius: 10%; margin-left: 4%;">
                <p style="font-size: 2.5vw; margin: 0;">7th grade chat</p>
            </div>
            <div class="divider"></div>
            <div class="messages">

            </div>
            <div class="inputandsend">
                <input placeholder="Type the message here." class="inpt">
                <button class="btn" onclick="send()">Send</button>
            </div>
        </div>
    </body>

    <script>
        function send() {
            const input = document.querySelector(".inpt");
            const messages = document.querySelector(".messages");
            const text = input.value.trim();
            if (!text) return;
            messages.insertAdjacentHTML("afterbegin", `
                <div class="msgsent">
                    <img src="secret.webp" style="width:12%; border-radius:10%; margin-left:4%;">
                    <p class="msg">${text}</p>
                </div>
            `);
            input.value = "";
            input.focus();
            messages.scrollTop = messages.scrollHeight;
        }
        document.querySelector(".inpt").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                send();
            }
        });
    </script>
</html>
